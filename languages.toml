[[language]]
name = "c"
auto-format = false
indent = {tab-width = 4, unit = "    "}
file-types = ["c", "h"]

[[language]]
name = "rust"
auto-format = false
indent = {tab-width = 4, unit = "    "}
roots = ["Cargo.lock"]
[language.config]
checkOnSave = {enable=true, command="clippy"}

[[language]]
name = "python"
auto-format = false
formatter = {command = "black", args = ["--quiet", "-"]}
indent = {tab-width = 4, unit = "    "}

[[language]]
name = "bash"
auto-format = false
formatter = {command = 'shfmt', args = ["-i", "4"]}
indent = {tab-width = 4, unit = "    "}

[[language]]
name = "markdown"
auto-format = false
language-server = {command = "ltex-ls"}
indent = {tab-width = 4, unit = "    "}
file-types = ["md", "txt"]
[[language.config]]
ltex.language = "en-US"

[[language]]
name = "git-commit"
auto-format = false
language-server = {command = "ltex-ls"}
indent = {tab-width = 4, unit = "    "}
rulers = [80]

[[language]]
name = "latex"
language-server = {command = "ltex-ls"}
indent = {tab-width = 4, unit = "    "}
file-types = ["tex"]

[[language]]
name = "toml"
auto-format = false
indent = {tab-width = 4, unit = "    "}

[[language]]
name = "typescript"
auto-format = false
indent = {tab-width = 4, unit = "    "}
language-server = {command = "typescript-language-server", args = ["--stdio"]}

[[language]]
name = "css"
auto-format = false
indent = {tab-width = 2, unit = "  "}

[[language]]
name = "html"
auto-format = false
indent = {tab-width = 2, unit = "  "}
